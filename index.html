async function loadMessages(agent) {

  renderMessages();
}

function renderMessages() {
  const container = document.getElementById('messages');
  if (!container) return;
  const msgs = conversations[currentAgent.id] || [];
  if (msgs.length === 0) {
    container.innerHTML = `<div class="empty-chat"><div class="empty-chat-text">💬 ${currentAgent.name}와 대화를 시작하세요</div></div>`;
    return;
  }
  container.innerHTML = msgs.map((msg, i) => `
    <div class="msg ${msg.role}" id="msg-${i}">
      <div class="msg-avatar" style="${msg.role === 'assistant' ? `background:${currentAgent.color}20;color:${currentAgent.color}` : ''}">
        ${msg.role === 'user' ? 'KM' : currentAgent.name[0]}
      </div>
      <div>
        <div class="msg-bubble md">${msg.role==='assistant' ? renderMd(msg.content) : escHtml(msg.content).replace(/\n/g,'<br>')}</div>
        <div class="msg-time">${new Date(msg.created_at).toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'})}</div>
      </div>
    </div>`).join('');
  container.scrollTop = container.scrollHeight;
}

// 마크다운 렌더러
function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function renderMd(text) {
  let t = text;
  // 코드블록
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${escHtml(code.trim())}</code></pre>`);
  // 인라인 코드
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  // 헤딩
  t = t.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  t = t.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  t = t.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // 굵게/기울임
  t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // 수평선
  t = t.replace(/^---+$/gm, '<hr>');
  // 순서없는 목록
  t = t.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  t = t.replace(/(<li>[\s\S]+?<\/li>)/g, '<ul>$1</ul>');
  // 줄바꿈
  t = t.replace(/\n\n+/g, '</p><p>');
  t = t.replace(/\n/g, '<br>');
  t = `<p>${t}</p>`;
  // 빈 p 제거
  t = t.replace(/<p><\/p>/g, '').replace(/<p>(<[hup])/g, '$1').replace(/(<\/[hup][^>]*>)<\/p>/g, '$1');
  return t;
}

let attachedFiles = []; // { type: 'image'|'text', name, data, mediaType }

async function handleFileSelect(event) {
  const files = Array.from(event.target.files);
  event.target.value = '';
  for (const file of files) {
    if (attachedFiles.length >= 5) { alert('첨부파일은 최대 5개까지 가능해요.'); break; }
    if (file.size > 50 * 1024 * 1024) { alert(`${file.name}: 50MB 이하 파일만 가능해요.`); continue; }
    if (file.type.startsWith('image/')) {
      const b64 = await fileToBase64(file);
      attachedFiles.push({ type: 'image', name: file.name, data: b64, mediaType: file.type });
    } else {
      const text = await file.text();
      attachedFiles.push({ type: 'text', name: file.name, data: text });
    }
  }
  renderAttachPreview();
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function renderAttachPreview() {
  const preview = document.getElementById('attachPreview');
  if (!preview) return;
  if (attachedFiles.length === 0) { preview.innerHTML = ''; return; }
  preview.innerHTML = attachedFiles.map((f, i) => {
    if (f.type === 'image') {
      return `<div class="attach-item"><img class="attach-item-img" src="data:${f.mediaType};base64,${f.data}"><span>${f.name}</span><span class="attach-remove" onclick="removeAttach(${i})">✕</span></div>`;
    }
    return `<div class="attach-item">📄<span>${f.name}</span><span class="attach-remove" onclick="removeAttach(${i})">✕</span></div>`;
  }).join('');
}

function removeAttach(i) {
  attachedFiles.splice(i, 1);
  renderAttachPreview();
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if ((!content && attachedFiles.length === 0) || isTyping) return;
  isTyping = true;
  document.getElementById('sendBtn').disabled = true;

  input.value = '';
  input.style.height = '48px';

  // 메시지 콘텐츠 구성 (멀티모달)
  let userContent;
  if (attachedFiles.length > 0) {
    userContent = [];
    // 이미지 먼저
    for (const f of attachedFiles) {
      if (f.type === 'image') {
        userContent.push({ type: 'image', source: { type: 'base64', media_type: f.mediaType, data: f.data } });
      }
    }
    // 텍스트 파일은 텍스트 블록으로
    let textParts = content ? content + '\n\n' : '';
    for (const f of attachedFiles) {
      if (f.type === 'text') {
        textParts += `[첨부파일: ${f.name}]\n\`\`\`\n${f.data.slice(0, 8000)}\n\`\`\`\n\n`;
      }
    }
    if (textParts.trim()) userContent.push({ type: 'text', text: textParts.trim() });
  } else {
    userContent = content;
  }

  // DB 저장용 텍스트 (파일명만 표시)
  const fileNames = attachedFiles.map(f => `[${f.name}]`).join(' ');
  const displayContent = [content, fileNames].filter(Boolean).join(' ');

  const filesSnapshot = [...attachedFiles];
  attachedFiles = [];
  renderAttachPreview();

  const userMsg = { agent_id: currentAgent.id, role: 'user', content: displayContent, created_at: new Date().toISOString() };
  await sb.from('conversations').insert(userMsg);
  conversations[currentAgent.id].push(userMsg);
  renderMessages();

  setTimeout(() => {
    const m = document.getElementById("messages");
    if (!m) return;
    const idx = conversations[currentAgent.id].length - 1;
    const lastUserEl = document.getElementById('msg-' + idx);
    if (lastUserEl) m.scrollTop = lastUserEl.offsetTop;
    else m.scrollTop = m.scrollHeight;
  }, 50);

  const typingDiv = document.createElement('div');
  typingDiv.className = 'msg assistant';
  typingDiv.id = 'streamingMsg';
  typingDiv.innerHTML = `<div class="msg-avatar" style="background:${currentAgent.color}20;color:${currentAgent.color}">${currentAgent.name[0]}</div><div class="msg-bubble" id="streamingBubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  document.getElementById('messages').appendChild(typingDiv);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

  // 히스토리 구성 (마지막 메시지는 멀티모달 콘텐츠로 교체)
  const history = conversations[currentAgent.id].slice(-20).map((m, idx, arr) => {
    if (idx === arr.length - 1 && filesSnapshot.length > 0) {
      return { role: 'user', content: userContent };
    }
    return { role: m.role, content: m.content };
  });

  let fullReply = '';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: currentAgent.system, messages: history, apiKey: CLAUDE_KEY })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      fullReply = `오류: ${data.error || '알 수 없는 오류'}`;
    } else {
      fullReply = data.text || '';
    }

    const bubble = document.getElementById('streamingBubble');
    if (bubble) bubble.innerHTML = renderMd(fullReply);

    if (fullReply && !fullReply.startsWith('오류:')) {
      const assistantMsg = { agent_id: currentAgent.id, role: 'assistant', content: fullReply, created_at: new Date().toISOString() };
      await sb.from('conversations').insert(assistantMsg);
      conversations[currentAgent.id].push(assistantMsg);
      msgCounts[currentAgent.id] = (msgCounts[currentAgent.id] || 0) + 2;
    }

  } catch(e) {
    fullReply = `네트워크 오류: ${e.message}`;
    const bubble = document.getElementById('streamingBubble');
    if (bubble) bubble.innerHTML = fullReply;
  }

  // streamingMsg 제거 후 전체 메시지 다시 렌더링
  const streamMsg = document.getElementById('streamingMsg');
  if (streamMsg) streamMsg.remove();
  renderMessages();

  // 답변 첫 줄이 화면에 보이도록 스크롤
  setTimeout(() => {
    const m = document.getElementById('messages');
    if (!m) return;
    const msgs = m.querySelectorAll('.msg.assistant');
    const lastAssistant = msgs[msgs.length - 1];
    if (lastAssistant) {
      lastAssistant.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }, 50);

  renderSidebar();
  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
}

let isComposing = false;
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey && !isComposing) {
    e.preventDefault();
    sendMessage();
  }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function goHome() { currentAgent = null; renderSidebar(); renderOrgView(); }

// 한글 조합 이벤트 처리
document.addEventListener('compositionstart', () => { isComposing = true; });
document.addEventListener('compositionend', () => { isComposing = false; });

checkConfig();
</script>
</body>
</html>
